<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GuardianMesh — Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#000000", "on-primary": "#ffffff",
                    "primary-container": "#131b2e", "on-primary-container": "#7c839b",
                    "primary-fixed": "#dae2fd", "primary-fixed-dim": "#bec6e0",
                    "secondary": "#006c49", "on-secondary": "#ffffff",
                    "secondary-container": "#6cf8bb", "on-secondary-container": "#00714d",
                    "error": "#ba1a1a", "on-error": "#ffffff",
                    "error-container": "#ffdad6", "on-error-container": "#93000a",
                    "background": "#f8f9ff", "on-background": "#0b1c30",
                    "surface": "#f8f9ff", "on-surface": "#0b1c30",
                    "surface-dim": "#cbdbf5", "surface-bright": "#f8f9ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#eff4ff",
                    "surface-container": "#e5eeff",
                    "surface-container-high": "#dce9ff",
                    "surface-container-highest": "#d3e4fe",
                    "on-surface-variant": "#45464d",
                    "outline": "#76777d", "outline-variant": "#c6c6cd"
                },
                borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                spacing: { "gutter": "16px", "margin-mobile": "16px", "margin-desktop": "32px", "sidebar-width": "320px", "status-pill-gap": "8px" },
                fontFamily: {
                    "headline-md": ["Inter"], "body-md": ["Inter"], "body-lg": ["Inter"],
                    "label-md": ["Inter"], "status-number": ["Inter"], "headline-lg": ["Inter"]
                },
                fontSize: {
                    "headline-md": ["20px", { lineHeight: "1.3", fontWeight: "600" }],
                    "body-md": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                    "body-lg": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                    "label-md": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }],
                    "status-number": ["13px", { lineHeight: "1", fontWeight: "700" }]
                }
            }
        }
    };
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    #map { background: #d3e4fe; }
    .leaflet-container { font-family: Inter, system-ui, sans-serif; }

    /* SOS pulsing marker (DivIcon content) */
    @keyframes fg-pulse {
        0%   { box-shadow: 0 0 0 0   rgba(186, 26, 26, 0.7); }
        70%  { box-shadow: 0 0 0 28px rgba(186, 26, 26, 0);  }
        100% { box-shadow: 0 0 0 0   rgba(186, 26, 26, 0);  }
    }
    .fg-sos-pulse {
        background:#ba1a1a;
        border:3px solid #ffffff;
        border-radius:9999px;
        width:36px;height:36px;
        display:flex;align-items:center;justify-content:center;
        font-family:Inter,sans-serif;font-weight:800;font-size:12px;
        color:#fff;
        animation: fg-pulse 1.5s infinite;
    }

    /* Top SOS banner */
    .fg-sos-banner {
        background: linear-gradient(90deg, #ba1a1a 0%, #93000a 100%);
        color:#fff;
    }
</style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden w-full h-screen relative flex">

<!-- TopAppBar for Mobile -->
<header class="flex md:hidden justify-between items-center w-full px-margin-mobile h-16 fixed top-0 z-50 bg-surface/80 backdrop-blur-md text-primary font-headline-md text-headline-md font-extrabold shadow-sm">
    <div class="flex items-center gap-2"><span>GuardianMesh</span></div>
    <div class="flex items-center gap-4">
        <button class="text-on-surface-variant" title="Notifications"><span class="material-symbols-outlined">notifications</span></button>
        <form method="POST" action="/api/auth/logout"><button class="text-on-surface-variant" title="Logout" type="submit"><span class="material-symbols-outlined">logout</span></button></form>
    </div>
</header>

<!-- SideNavBar for Desktop -->
<nav class="hidden md:flex flex-col fixed left-0 top-0 h-screen w-sidebar-width z-40 bg-surface-container-low border-r border-outline-variant/20 shadow-[0_4px_12px_rgba(15,23,42,0.08)]">
    <div class="p-gutter pb-8 border-b border-outline-variant/20">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary">
                <span class="material-symbols-outlined">shield_lock</span>
            </div>
            <div>
                <h1 class="font-headline-md text-headline-md font-bold text-primary">{{CIRCLE_NAME}}</h1>
                <p class="font-label-md text-label-md text-on-surface-variant">Signed in as {{DISPLAY_NAME}}</p>
            </div>
        </div>
        <button id="sos-btn" class="w-full bg-secondary text-on-secondary font-label-md text-label-md py-3 rounded-full flex items-center justify-center gap-2 hover:bg-secondary/90 shadow-sm">
            <span class="material-symbols-outlined">sos</span> SOS Signal
        </button>
    </div>
    <div class="flex-1 overflow-y-auto py-4 flex flex-col gap-2 px-2">
        <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-primary font-bold border-r-4 border-primary bg-surface-container-high" href="/dashboard">
            <span class="material-symbols-outlined">map</span><span class="font-label-md text-label-md">Dashboard</span>
        </a>
        <span class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant opacity-50 cursor-not-allowed">
            <span class="material-symbols-outlined">person_pin_circle</span><span class="font-label-md text-label-md">Details (soon)</span>
        </span>
        <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:text-primary hover:bg-surface-container" href="/places">
            <span class="material-symbols-outlined">distance</span><span class="font-label-md text-label-md">Safety Places</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:text-primary hover:bg-surface-container" href="/settings">
            <span class="material-symbols-outlined">group_add</span><span class="font-label-md text-label-md">Circle Settings</span>
        </a>
    </div>
    <div class="mt-auto border-t border-outline-variant/20 p-2 flex flex-col gap-2">
        <form method="POST" action="/api/auth/logout">
            <button type="submit" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-on-surface-variant hover:text-primary hover:bg-surface-container">
                <span class="material-symbols-outlined">logout</span><span class="font-label-md text-label-md">Logout</span>
            </button>
        </form>
    </div>
</nav>

<!-- Main map canvas -->
<main class="flex-1 relative md:ml-sidebar-width w-full h-full bg-surface-container-low">
    <!-- SOS banner (hidden by default; revealed by app.js when an SOS is active) -->
    <div id="sos-banner" class="hidden fg-sos-banner absolute top-0 left-0 right-0 z-30 px-4 py-3 flex items-center gap-3 shadow-lg">
        <span class="material-symbols-outlined">sos</span>
        <div class="flex-1 min-w-0">
            <div id="sos-banner-title" class="font-bold text-sm md:text-base"></div>
            <div id="sos-banner-meta" class="text-xs opacity-90"></div>
        </div>
        <button id="sos-locate" class="px-3 py-1.5 rounded-full bg-white/15 hover:bg-white/25 text-sm">Locate</button>
        <button id="sos-resolve" class="hidden px-3 py-1.5 rounded-full bg-white text-error font-semibold text-sm hover:bg-white/90">Resolve</button>
    </div>

    <div id="map" class="absolute inset-0 w-full h-full z-0"></div>

    <!-- Floating live circle panel -->
    <aside class="absolute top-20 md:top-gutter right-gutter md:right-margin-desktop w-[340px] max-w-[calc(100vw-32px)] bg-surface/95 backdrop-blur-md rounded-xl shadow-[0_12px_24px_rgba(15,23,42,0.15)] border border-outline-variant/30 flex flex-col z-20 overflow-hidden">
        <div class="p-4 border-b border-outline-variant/20 flex justify-between items-center bg-surface-bright">
            <h2 class="font-headline-md text-headline-md text-primary font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-secondary">group</span> Live Circle
            </h2>
            <span id="active-count" class="font-status-number text-status-number text-on-surface-variant bg-surface-container-low px-2 py-1 rounded-full">0 Active</span>
        </div>
        <div id="member-list" class="flex flex-col max-h-[60vh] overflow-y-auto"></div>
    </aside>
</main>

<!-- BottomNavBar for mobile -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-surface shadow-[0_-4px_12px_rgba(15,23,42,0.08)] rounded-t-xl">
    <a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1" href="/dashboard">
        <span class="material-symbols-outlined">explore</span><span class="font-label-md text-label-md mt-1">Map</span>
    </a>
    <span class="flex flex-col items-center justify-center text-on-surface-variant opacity-50">
        <span class="material-symbols-outlined">group</span><span class="font-label-md text-label-md mt-1">Members</span>
    </span>
    <span class="flex flex-col items-center justify-center text-on-surface-variant opacity-50">
        <span class="material-symbols-outlined">share_location</span><span class="font-label-md text-label-md mt-1">Places</span>
    </span>
    <span class="flex flex-col items-center justify-center text-on-surface-variant opacity-50">
        <span class="material-symbols-outlined">notifications_active</span><span class="font-label-md text-label-md mt-1">Alerts</span>
    </span>
</nav>

<!-- Toasts (geofence enter/exit notifications) -->
<div id="toast-host" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

<script>window.__GUARDIAN_STATE__ = {{{INITIAL_STATE_JSON}}};</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/public/app.js"></script>
</body></html>
