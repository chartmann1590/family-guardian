<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Family Guardian - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary-fixed": "#00174b",
                        "inverse-primary": "#b4c5ff",
                        "secondary": "#006c49",
                        "secondary-fixed": "#6ffbbe",
                        "tertiary-container": "#bc4800",
                        "primary-fixed": "#dbe1ff",
                        "primary": "#004ac6",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface-container-highest": "#d3e4fe",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-container": "#6cf8bb",
                        "on-secondary-fixed-variant": "#005236",
                        "surface": "#f8f9ff",
                        "tertiary": "#943700",
                        "surface-variant": "#d3e4fe",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-surface": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbcd",
                        "on-tertiary-fixed": "#360f00",
                        "on-background": "#0b1c30",
                        "on-tertiary-container": "#ffede6",
                        "on-surface-variant": "#434655",
                        "error": "#ba1a1a",
                        "on-primary-container": "#eeefff",
                        "surface-tint": "#0053db",
                        "background": "#f8f9ff",
                        "primary-container": "#2563eb",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-bright": "#f8f9ff",
                        "inverse-surface": "#213145",
                        "outline": "#737686",
                        "surface-container-high": "#dce9ff",
                        "outline-variant": "#c3c6d7",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-container": "#00714d",
                        "surface-container": "#e5eeff",
                        "surface-dim": "#cbdbf5",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-lg": "24px",
                        "gutter": "16px",
                        "stack-gap-md": "16px",
                        "container-padding": "20px",
                        "stack-gap-sm": "8px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-bold": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-container-padding font-body-lg antialiased">
<!-- Main Container -->
<main class="w-full max-w-md flex flex-col gap-stack-gap-lg">
<!-- Header / Brand Area -->
<header class="flex flex-col items-center text-center gap-stack-gap-sm mb-4">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Family Guardian</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px]">
                Your self-hosted digital safety net. Secure, private, and always under your control.
            </p>
</header>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-stack-gap-lg border border-surface-container-high">
<form class="flex flex-col gap-stack-gap-lg">
<!-- Server URL Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider ml-1" for="server_url">Home Server URL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-outline group-focus-within:text-primary transition-colors">dns</span>
<input class="w-full bg-surface-container-low pl-12 pr-4 py-3 rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:bg-surface-container-high transition-all font-body-lg text-body-lg text-on-surface outline-none placeholder-outline placeholder:font-body-sm" id="server_url" name="server_url" placeholder="https://fg.home.arpa" required="" type="url"/>
</div>
</div>
<!-- Username Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider ml-1" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface-container-low pl-12 pr-4 py-3 rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:bg-surface-container-high transition-all font-body-lg text-body-lg text-on-surface outline-none placeholder-outline placeholder:font-body-sm" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center ml-1">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low pl-12 pr-4 py-3 rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:bg-surface-container-high transition-all font-body-lg text-body-lg text-on-surface outline-none placeholder-outline placeholder:font-body-lg tracking-widest" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md rounded-full py-4 mt-2 shadow-sm hover:bg-surface-tint active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                    Connect to Server
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Help Text -->
<div class="text-center mt-4">
<p class="font-label-md text-label-md text-on-surface-variant">
                Need help finding your server URL? <br/>
<a class="text-primary hover:underline font-label-bold" href="#">View Setup Guide</a>
</p>
</div>
</main>
</body></html>
