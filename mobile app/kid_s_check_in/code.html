<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Family Guardian - Kid's Check-in</title>

                    "spacing": {

                        "unit": "4px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Inter"],

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom hide scrollbar for clean app feel */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg antialiased select-none">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm docked full-width top-0 flex justify-between items-center w-full px-container-padding py-stack-gap-sm sticky z-40">
<div class="flex items-center gap-stack-gap-sm">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high shrink-0">
<img alt="User profile avatar" class="w-full h-full object-cover object-center" data-alt="A portrait photograph of a young child with a bright, joyful smile, wearing a colorful t-shirt, set against a soft, naturally lit background. The lighting is high-key and cheerful, creating a warm and approachable mood suitable for a user profile avatar." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6zihip8wnuy89pFP1PF2zx2K8R5HivckU8E4a8N81_V_ubkCJdLSHihwToLpoyvSoO2QO8ipRvUxKYCkMZzbbEKPf7LTu6_3eMTphkJmg_nzb_-JEQKvpe8pGBChrNwzNieac78HAzzaUr4YzlKc4Mrf3EX1i4k0WkaxWxCDFUoze1N2e9XAb2VNbjUmI0EXaBHHAFbhSarSw76bWVjMebxOheL9fjXWQv-6i2jPRoKSvUsepqJ0rPTJGAH_M6Rok9eQzo9Hd9CM"/>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Family Guardian</h1>
</div>
<button aria-label="settings" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors hover:scale-95 duration-100">
<span class="material-symbols-outlined text-[24px]">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 overflow-y-auto px-container-padding pt-stack-gap-lg pb-[100px] flex flex-col gap-stack-gap-lg md:hidden">
<!-- Greeting & Status -->
<div class="flex flex-col gap-stack-gap-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Hi there! 👋</h2>
<div class="inline-flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full self-start shadow-sm border border-surface-variant">
<span class="w-2.5 h-2.5 rounded-full bg-secondary"></span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Location Shared</span>
</div>
</div>
<!-- Big Actions Bento Grid -->
<div class="grid grid-cols-2 gap-stack-gap-md mt-2">
<!-- I'm Safe Button (Primary positive action) -->
<button class="bg-secondary-container text-on-secondary-container rounded-[24px] p-6 flex flex-col items-center justify-center gap-4 shadow-[0_4px_12px_rgba(0,0,0,0.06)] active:scale-95 transition-transform active:shadow-sm h-40">
<span class="text-[48px] leading-none block">👍</span>
<span class="font-headline-md text-headline-md text-center leading-tight">I'm Safe</span>
</button>
<!-- Arrived Button -->
<button class="bg-surface-container-highest text-on-surface rounded-[24px] p-6 flex flex-col items-center justify-center gap-4 shadow-[0_4px_12px_rgba(0,0,0,0.06)] active:scale-95 transition-transform active:shadow-sm h-40">
<span class="text-[48px] leading-none block">🏫</span>
<span class="font-headline-md text-headline-md text-center leading-tight">Arrived</span>
</button>
<!-- Heading Home Button -->
<button class="bg-surface-dim text-on-surface rounded-[24px] p-6 flex flex-col items-center justify-center gap-4 shadow-[0_4px_12px_rgba(0,0,0,0.06)] active:scale-95 transition-transform active:shadow-sm h-40">
<span class="text-[48px] leading-none block">🏠</span>
<span class="font-headline-md text-headline-md text-center leading-tight">Heading<br/>Home</span>
</button>
<!-- Call Me Button (High Alert) -->
<button class="bg-error-container text-on-error-container rounded-[24px] p-6 flex flex-col items-center justify-center gap-4 shadow-[0_8px_20px_rgba(186,26,26,0.15)] active:scale-95 transition-transform active:shadow-sm h-40 border-2 border-error/20">
<span class="material-symbols-outlined text-[48px] text-error" data-weight="fill">phone_in_talk</span>
<span class="font-headline-md text-headline-md text-center leading-tight">Call Me</span>
</button>
</div>
<!-- Send Location CTA -->
<div class="mt-4">
<button class="w-full bg-primary text-on-primary rounded-[24px] py-5 px-6 flex items-center justify-center gap-3 shadow-[0_8px_20px_rgba(0,74,198,0.2)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]" data-weight="fill">location_on</span>
<span class="font-headline-md text-headline-md">Send Location Now</span>
</button>
</div>
</main>
<!-- Web Placeholder (Since instructions emphasize mobile UI for BottomNav, hiding on md) -->
<div class="hidden md:flex flex-1 items-center justify-center bg-surface-container-low text-on-surface-variant font-headline-md text-headline-md">
        Please view on a mobile device for the optimal experience.
    </div>
<!-- BottomNavBar -->
<nav class="bg-surface shadow-lg docked full-width bottom-0 rounded-t-xl fixed w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 md:hidden border-t-0">
<!-- Map (Inactive) -->
<button aria-label="Map" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-low transition-all min-w-[64px]">
<span class="material-symbols-outlined text-[24px] mb-1">map</span>
<span class="font-label-md text-label-md">Map</span>
</button>
<!-- Chat (Inactive) -->
<button aria-label="Chat" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-low transition-all min-w-[64px]">
<span class="material-symbols-outlined text-[24px] mb-1">chat</span>
<span class="font-label-md text-label-md">Chat</span>
</button>
<!-- History (Inactive) -->
<button aria-label="History" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-low transition-all min-w-[64px]">
<span class="material-symbols-outlined text-[24px] mb-1">history</span>
<span class="font-label-md text-label-md">History</span>
</button>
<!-- Safety (Active) -->
<button aria-label="Safety" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 hover:bg-surface-container-low transition-all active:scale-90 duration-200 min-w-[80px]">
<span class="material-symbols-outlined text-[24px] mb-1" data-weight="fill">security</span>
<span class="font-label-md text-label-md font-bold">Safety</span>
</button>
</nav>
</body></html>
