<!DOCTYPE html>

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff; /* bg-background */

<body class="min-h-screen flex items-center justify-center p-4 md:p-8 bg-surface">
<main class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-[0_12px_24px_rgba(15,23,42,0.15)] overflow-hidden">
<!-- Header Section -->
<header class="bg-primary text-on-primary p-8 text-center relative overflow-hidden">
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-4xl mb-4" data-weight="fill" style="font-variation-settings: 'FILL' 1;">dns</span>
<h1 class="font-headline-lg text-headline-lg md:font-headline-lg md:text-headline-lg mb-2">Configure Server</h1>
<p class="font-body-md text-body-md text-primary-fixed-dim max-w-md mx-auto">Step 3 of 3: Connect your self-hosted instance to finalize setup.</p>
</div>
<!-- Decorative background elements -->
<div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 20% 150%, #ffffff 0%, transparent 50%);"></div>
</header>
<!-- Form Section -->
<div class="p-8 md:p-12">
<div class="space-y-8">
<!-- Server URL Input -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="server_url">Server URL</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-outline">link</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-outline-variant" id="server_url" name="server_url" placeholder="https://guardian.yourdomain.com" type="url"/>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-xs mt-1">Must be a secure (HTTPS) endpoint accessible from this device.</p>
</div>
<!-- API Key Input -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="api_key">API Key</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-outline">key</span>
</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-outline-variant" id="api_key" name="api_key" placeholder="Enter your generated API key" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Test Connection Section (Simulated Success State) -->
<div class="bg-surface-container-low p-6 rounded-lg border border-surface-variant flex flex-col sm:flex-row items-center justify-between gap-4">
<div class="flex items-center gap-3 w-full sm:w-auto">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-secondary-container" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Connection Successful</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Latency: 42ms</p>
</div>
</div>
<button class="w-full sm:w-auto px-6 py-2 bg-surface border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-primary flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">sync</span>
                        Re-test
                    </button>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-12 flex flex-col-reverse sm:flex-row items-center justify-between gap-4 pt-6 border-t border-surface-variant">
<button class="w-full sm:w-auto px-6 py-3 text-on-surface-variant font-label-md text-label-md rounded-lg hover:bg-surface-container transition-colors focus:outline-none flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back
                </button>
<button class="w-full sm:w-auto px-8 py-3 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 transition-opacity focus:outline-none focus:ring-4 focus:ring-primary-fixed flex items-center justify-center gap-2 shadow-[0_4px_12px_rgba(15,23,42,0.08)]" type="button">
                    Complete Setup
                    <span class="material-symbols-outlined text-[18px]">rocket_launch</span>
</button>
</div>
</div>
