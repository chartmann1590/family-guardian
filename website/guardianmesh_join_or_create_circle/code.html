<!DOCTYPE html>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-gutter md:p-margin-desktop">
<div class="w-full max-w-4xl flex flex-col items-center text-center">
<!-- Progress Indicator -->
<div class="flex items-center gap-2 mb-8 md:mb-12">
<div class="w-12 h-2 rounded-full bg-primary-fixed"></div>
<div class="w-12 h-2 rounded-full bg-primary"></div>
<div class="w-12 h-2 rounded-full bg-surface-container-high"></div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg mb-2">Set up your Family Circle</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xl mx-auto mb-10 md:mb-16">
            A Circle is your private group where members can share locations and safety alerts. Are you starting a new one, or joining an existing group?
        </p>
<!-- Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
<!-- Create Circle Card -->
<button class="group flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest border border-outline-variant hover:border-primary hover:shadow-[0_12px_24px_rgba(15,23,42,0.15)] transition-all duration-300 text-left focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<h2 class="font-headline-md text-headline-md mb-3 text-on-surface">Create a New Circle</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    I am the Family Administrator. Set up a new secure perimeter and invite family members to join my network.
                </p>
<div class="mt-8 flex items-center text-primary font-label-md text-label-md uppercase tracking-wider">
                    Start Setup <span class="material-symbols-outlined ml-2 text-sm">arrow_forward</span>
</div>
</button>
<!-- Join Circle Card -->
<button class="group flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest border border-outline-variant hover:border-primary hover:shadow-[0_12px_24px_rgba(15,23,42,0.15)] transition-all duration-300 text-left focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'FILL' 1;">group</span>
</div>
<h2 class="font-headline-md text-headline-md mb-3 text-on-surface">Join an Existing Circle</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    I have an invite code. Connect to an existing family network managed by another administrator.
                </p>
<div class="mt-8 w-full">
<label class="sr-only" for="invite-code">Invite Code</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant pointer-events-none">vpn_key</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 font-body-md text-body-md transition-colors" id="invite-code" onclick="event.stopPropagation();" placeholder="Enter Invite Code" type="text"/>
</div></div></button><button class="absolute right-2 bg-primary text-on-primary font-label-md text-label-md px-4 py-1.5 rounded-md hover:bg-on-surface transition-colors" onclick="event.stopPropagation();">Join</button>
</div>
</div>
<!-- Back Action -->
<button class="mt-12 flex items-center text-on-surface-variant hover:text-primary font-label-md text-label-md transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background rounded-md px-2 py-1">
<span class="material-symbols-outlined mr-2 text-sm">arrow_back</span>
            Back to Profile
        </button>
</body></html>
