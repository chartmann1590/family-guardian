# Dependabot config — version-update PRs are disabled (open-pull-requests-limit: 0)
# so the repo stays clean. Security updates still PR automatically when enabled
# in repo settings (Settings → Code security → Dependabot security updates).
# Bump these limits if you want regular version-update PRs again.

version: 2
updates:
  - package-ecosystem: npm
    directory: '/server'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies, server]

  - package-ecosystem: npm
    directory: '/e2e'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies, e2e]

  - package-ecosystem: gradle
    directory: '/android'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies, android]

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: '/server'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies, docker]
