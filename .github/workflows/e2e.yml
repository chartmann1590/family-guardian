name: E2E (Playwright)

on:
  push:
    branches: [master, main]
    paths:
      - 'server/**'
      - 'android/**'
      - 'e2e/**'
      - 'docker-compose.yml'
      - 'scripts/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'server/**'
      - 'android/**'
      - 'e2e/**'
      - 'docker-compose.yml'
      - 'scripts/**'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            e2e/package.json

      - name: Build APK + Docker image
        run: node scripts/build-image.mjs

      - name: Boot container with fresh DB
        env:
          SESSION_SECRET: ci-session-secret-not-for-production
          HOST_PORT: 18080
        run: |
          docker compose up -d
          for i in $(seq 1 45); do
            status=$(docker inspect family-guardian --format '{{.State.Health.Status}}' 2>/dev/null || echo starting)
            echo "health=$status"
            [ "$status" = "healthy" ] && break
            sleep 2
          done

      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          FG_BASE_URL: http://127.0.0.1:18080
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Container logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose down -v
