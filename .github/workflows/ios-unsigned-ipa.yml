name: iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'ios-app/**'
      - '.github/workflows/ios-unsigned-ipa.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'ios-app/**'
      - '.github/workflows/ios-unsigned-ipa.yml'

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ios-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Patch ExpoModulesCore Swift 5 conformance syntax
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              "node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift": [
                  (": ExpoView, @MainActor AnyExpoSwiftUIHostingView", ": ExpoView, AnyExpoSwiftUIHostingView"),
              ],
              "node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift": [
                  (": @MainActor ExpoSwiftUI.ViewWrapper", ": ExpoSwiftUI.ViewWrapper"),
              ],
              "node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift": [
                  (": @MainActor AnyArgument", ": AnyArgument"),
              ],
          }

          for file, edits in replacements.items():
              path = Path(file)
              text = path.read_text()
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f"Expected text not found in {file}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text)
              print(f"Patched {file}")
          PY

      - name: Patch expo-image-picker iOS 26 PHAsset.contentType API
        # expo-image-picker ~55.0.20 references PHAsset/PHAssetResource.contentType
        # behind `if #available(iOS 26.0, *)`. The macOS-latest runner's Xcode
        # SDK predates iOS 26 so the symbol is unknown; collapse to the else
        # branch which already provides a fallback via UTType(filenameExtension:).
        run: |
          python3 <<'PY'
          from pathlib import Path

          file = "node_modules/expo-image-picker/ios/MediaHandler.swift"
          path = Path(file)
          text = path.read_text()
          edits = [
              (
                  "    let utType: UTType? = if #available(iOS 26.0, *) {\n"
                  "      asset?.contentType ?? UTType(filenameExtension: fileExtension)\n"
                  "    } else {\n"
                  "      UTType(filenameExtension: fileExtension)\n"
                  "    }\n",
                  "    let utType: UTType? = UTType(filenameExtension: fileExtension)\n",
              ),
              (
                  "    let utType: UTType? = if #available(iOS 26.0, *) {\n"
                  "      resource.contentType\n"
                  "    } else {\n"
                  "      UTType(resource.uniformTypeIdentifier) ?? UTType(filenameExtension: fileExtension)\n"
                  "    }\n",
                  "    let utType: UTType? = UTType(resource.uniformTypeIdentifier) ?? UTType(filenameExtension: fileExtension)\n",
              ),
          ]
          for old, new in edits:
              if old not in text:
                  raise SystemExit(f"Expected block not found in {file}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          print(f"Patched {file}")
          PY

      - name: Patch expo-notifications unsupported DateComponents field
        run: |
          python3 <<'PY'
          from pathlib import Path

          file = "node_modules/expo-notifications/ios/ExpoNotifications/Notifications/DateComponentsSerializer.swift"
          path = Path(file)
          text = path.read_text()
          old = (
              '    if #available(iOS 26.0, *) {\n'
              '      serializedComponents["isRepeatedDay"] = dateComponents.isRepeatedDay ?? false\n'
              '    }\n\n'
          )
          if old not in text:
              raise SystemExit(f"Expected unsupported isRepeatedDay block not found in {file}")
          path.write_text(text.replace(old, "", 1))
          print(f"Patched {file}")
          PY

      - name: Patch Expo root view factory for React Native 0.81
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              "node_modules/expo/ios/AppDelegates/EXReactRootViewFactory.h": [
                  (
                      "#if TARGET_OS_IOS || TARGET_OS_TV\n"
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions\n"
                      "               devMenuConfiguration:(nullable RCTDevMenuConfiguration *)devMenuConfiguration;\n"
                      "#else\n"
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions;\n"
                      "#endif\n",
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions;\n",
                  ),
              ],
              "node_modules/expo/ios/AppDelegates/EXReactRootViewFactory.mm": [
                  ("#import <React/RCTDevMenu.h>\n", ""),
                  (
                      "#if TARGET_OS_IOS || TARGET_OS_TV\n"
                      "- (UIView *)viewWithModuleName:(NSString *)moduleName\n"
                      "             initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                 launchOptions:(nullable NSDictionary *)launchOptions\n"
                      "          devMenuConfiguration:(RCTDevMenuConfiguration *)devMenuConfiguration\n"
                      "{\n"
                      "  if (self.reactDelegate != nil) {\n"
                      "    return [((id<EXReactDelegateProtocol>)self.reactDelegate) createReactRootViewWithModuleName:moduleName initialProperties:initialProperties launchOptions:launchOptions];\n"
                      "  }\n"
                      "  return [super viewWithModuleName:moduleName initialProperties:initialProperties launchOptions:launchOptions devMenuConfiguration:devMenuConfiguration];\n"
                      "}\n\n"
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions\n"
                      "               devMenuConfiguration:(nullable RCTDevMenuConfiguration *)devMenuConfiguration\n"
                      "{\n"
                      "  if (devMenuConfiguration == nil) {\n"
                      "    devMenuConfiguration = [RCTDevMenuConfiguration defaultConfiguration];\n"
                      "  }\n\n"
                      "  return [super viewWithModuleName:moduleName initialProperties:initialProperties launchOptions:launchOptions devMenuConfiguration:devMenuConfiguration];\n"
                      "}\n"
                      "#else\n",
                      "",
                  ),
                  ("#endif\n\n- (NSURL *)bundleURL\n", "- (NSURL *)bundleURL\n"),
              ],
              "node_modules/expo/ios/AppDelegates/ExpoReactNativeFactory.swift": [
                  (
                      "      // RCTDevMenuConfiguration is only available in react-native 0.83+\n"
                      "#if os(iOS) || os(tvOS)\n"
                      "      // When calling `recreateRootViewWithBundleURL:` from `EXReactRootViewFactory`,\n"
                      "      // we don't want to loop the ReactDelegate again. Otherwise, it will be an infinite loop.\n"
                      "      rootView = factory.superView(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions ?? [:],\n"
                      "        devMenuConfiguration: self.devMenuConfiguration\n"
                      "      )\n"
                      "#else\n"
                      "      rootView = factory.superView(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions ?? [:]\n"
                      "      )\n"
                      "#endif\n",
                      "      // When calling `recreateRootViewWithBundleURL:` from `EXReactRootViewFactory`,\n"
                      "      // we don't want to loop the ReactDelegate again. Otherwise, it will be an infinite loop.\n"
                      "      rootView = factory.superView(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions ?? [:]\n"
                      "      )\n",
                  ),
                  (
                      "#if os(iOS) || os(tvOS)\n"
                      "      rootView = rootViewFactory.view(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions,\n"
                      "        devMenuConfiguration: self.devMenuConfiguration\n"
                      "      )\n"
                      "#else\n"
                      "      rootView = rootViewFactory.view(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions\n"
                      "      )\n"
                      "#endif\n",
                      "      rootView = rootViewFactory.view(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions\n"
                      "      )\n",
                  ),
              ],
          }

          for file, edits in replacements.items():
              path = Path(file)
              text = path.read_text()
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f"Expected text not found in {file}")
                  text = text.replace(old, new, 1)
              path.write_text(text)
              print(f"Patched {file}")
          PY

      - name: Typecheck
        run: npm run typecheck

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Patch Podfile post_install for minimal strict-concurrency
        # Keep Xcode in valid Swift 5 language mode and relax strict-concurrency
        # checks inside the generated post_install hook. CocoaPods rejects
        # multiple post_install hooks.
        run: |
          python3 <<'PY'
          import re, sys
          p = "ios/Podfile"
          src = open(p).read()
          inject = (
              "\n"
              "    installer.pods_project.targets.each do |t|\n"
              "      t.build_configurations.each do |c|\n"
              "        c.build_settings['SWIFT_VERSION'] = '5.0'\n"
              "        c.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'\n"
              "      end\n"
              "    end\n"
          )
          marker = "    )\n  end\n"
          if marker not in src:
              sys.stderr.write("ERROR: react_native_post_install block terminator not found in Podfile\n")
              sys.exit(1)
          new = src.replace(marker, "    )" + inject + "\n  end\n", 1)
          open(p, "w").write(new)
          print(f"Patched ios/Podfile (injected {len(inject)} chars).")
          PY
          echo "--- Patched ios/Podfile ---"
          cat ios/Podfile

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build unsigned iPhoneOS app
        run: |
          set -uo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' -type d | head -n 1)
          if [ -z "$WORKSPACE" ]; then echo "No .xcworkspace found in ios/"; exit 1; fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"
          set +e
          xcodebuild \
            -quiet \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log | grep -E "error:|fatal error:|warning:.*error|\\*\\* BUILD FAILED|The following build commands failed|^(/.*):[0-9]+:[0-9]+:"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::group::xcodebuild error lines"
            grep -nE "error:|fatal error:|warning:.*error|\*\* BUILD FAILED" xcodebuild.log || true
            echo "::endgroup::"
            echo "::group::Swift diagnostic files"
            find build -name '*.dia' 2>/dev/null | while read d; do
              if strings "$d" 2>/dev/null | grep -qE "error:|warning:"; then
                echo "--- $d ---"
                strings "$d" 2>/dev/null | grep -E "error:|warning:|note:" | head -40
              fi
            done
            echo "::endgroup::"
            exit "$STATUS"
          fi

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name '*.app' -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 1; fi
          rm -rf Payload FamilyGuardian-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/FamilyGuardian.app
          zip -qry FamilyGuardian-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: FamilyGuardian-unsigned-ipa
          path: ios-app/FamilyGuardian-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
