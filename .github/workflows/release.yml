name: Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BASE_VERSION: 0.1

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.compute.outputs.version_name }}
      version_code: ${{ steps.compute.outputs.version_code }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - id: compute
        run: |
          set -euo pipefail
          VERSION_CODE="${{ github.run_number }}"
          VERSION_NAME="${BASE_VERSION}.${VERSION_CODE}"
          TAG="v${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building ${TAG} (code ${VERSION_CODE})"

  build-android:
    needs: version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Assemble debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -PFG_VERSION_CODE=${{ needs.version.outputs.version_code }} \
            -PFG_VERSION_NAME=${{ needs.version.outputs.version_name }}

      - name: Rename APK
        run: |
          set -euo pipefail
          SRC=app/build/outputs/apk/debug/app-debug.apk
          DST=app/build/outputs/apk/debug/family-guardian-${{ needs.version.outputs.version_name }}.apk
          cp "$SRC" "$DST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/family-guardian-${{ needs.version.outputs.version_name }}.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    needs: version
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ios-app/package-lock.json

      - name: Inject version + build number
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const p = "app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.expo.version = process.env.FG_VERSION_NAME;
            j.expo.ios = j.expo.ios || {};
            j.expo.ios.buildNumber = process.env.FG_VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log("version=" + j.expo.version, "buildNumber=" + j.expo.ios.buildNumber);
          '
        env:
          FG_VERSION_NAME: ${{ needs.version.outputs.version_name }}
          FG_VERSION_CODE: ${{ needs.version.outputs.version_code }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build unsigned iPhoneOS app
        run: |
          set -euo pipefail
          WORKSPACE=$(ls ios/*.xcworkspace | head -n 1)
          if [ -z "$WORKSPACE" ]; then echo "No .xcworkspace found in ios/"; exit 1; fi
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["workspace"]["schemes"][0])')
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name '*.app' -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 1; fi
          IPA="FamilyGuardian-${{ needs.version.outputs.version_name }}-unsigned.ipa"
          rm -rf Payload "$IPA"
          mkdir Payload
          cp -R "$APP_PATH" Payload/FamilyGuardian.app
          zip -qry "$IPA" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios-app/FamilyGuardian-${{ needs.version.outputs.version_name }}-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [version, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: dist

      - name: List release assets
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Family Guardian ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Automated build from commit ${{ github.sha }}.

            **Android** — install `family-guardian-${{ needs.version.outputs.version_name }}.apk`. Allow "Install from unknown sources" for your browser/file manager.

            **iOS native** — download `FamilyGuardian-${{ needs.version.outputs.version_name }}-unsigned.ipa`, then sign and install with Sideloadly or AltStore on Windows/macOS using a free Apple ID. Free-signed apps need to be re-signed every 7 days. See `docs/ios-native-sideloading.html`.

            **iOS PWA** — no download. From the iPhone, open Safari → `http://<your-server>:8080/app` → Share → Add to Home Screen.

            Version code: `${{ needs.version.outputs.version_code }}`.
          files: |
            dist/*.apk
            dist/*.ipa
          fail_on_unmatched_files: true
