name: Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BASE_VERSION: 0.1

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.compute.outputs.version_name }}
      version_code: ${{ steps.compute.outputs.version_code }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - id: compute
        run: |
          set -euo pipefail
          VERSION_CODE="${{ github.run_number }}"
          VERSION_NAME="${BASE_VERSION}.${VERSION_CODE}"
          TAG="v${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building ${TAG} (code ${VERSION_CODE})"

  build-android:
    needs: version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Assemble debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -PFG_VERSION_CODE=${{ needs.version.outputs.version_code }} \
            -PFG_VERSION_NAME=${{ needs.version.outputs.version_name }}

      - name: Rename APK
        run: |
          set -euo pipefail
          SRC=app/build/outputs/apk/debug/app-debug.apk
          DST=app/build/outputs/apk/debug/family-guardian-${{ needs.version.outputs.version_name }}.apk
          cp "$SRC" "$DST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/family-guardian-${{ needs.version.outputs.version_name }}.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    needs: version
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ios-app/package-lock.json

      - name: Inject version + build number
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const p = "app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.expo.version = process.env.FG_VERSION_NAME;
            j.expo.ios = j.expo.ios || {};
            j.expo.ios.buildNumber = process.env.FG_VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log("version=" + j.expo.version, "buildNumber=" + j.expo.ios.buildNumber);
          '
        env:
          FG_VERSION_NAME: ${{ needs.version.outputs.version_name }}
          FG_VERSION_CODE: ${{ needs.version.outputs.version_code }}

      - name: Install dependencies
        run: npm ci

      - name: Patch ExpoModulesCore Swift 5 conformance syntax
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              "node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift": [
                  (": ExpoView, @MainActor AnyExpoSwiftUIHostingView", ": ExpoView, AnyExpoSwiftUIHostingView"),
              ],
              "node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift": [
                  (": @MainActor ExpoSwiftUI.ViewWrapper", ": ExpoSwiftUI.ViewWrapper"),
              ],
              "node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift": [
                  (": @MainActor AnyArgument", ": AnyArgument"),
              ],
          }

          for file, edits in replacements.items():
              path = Path(file)
              text = path.read_text()
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f"Expected text not found in {file}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text)
              print(f"Patched {file}")
          PY

      - name: Patch expo-notifications unsupported DateComponents field
        run: |
          python3 <<'PY'
          from pathlib import Path

          file = "node_modules/expo-notifications/ios/ExpoNotifications/Notifications/DateComponentsSerializer.swift"
          path = Path(file)
          text = path.read_text()
          old = (
              '    if #available(iOS 26.0, *) {\n'
              '      serializedComponents["isRepeatedDay"] = dateComponents.isRepeatedDay ?? false\n'
              '    }\n\n'
          )
          if old not in text:
              raise SystemExit(f"Expected unsupported isRepeatedDay block not found in {file}")
          path.write_text(text.replace(old, "", 1))
          print(f"Patched {file}")
          PY

      - name: Patch Expo root view factory for React Native 0.81
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              "node_modules/expo/ios/AppDelegates/EXReactRootViewFactory.h": [
                  (
                      "#if TARGET_OS_IOS || TARGET_OS_TV\n"
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions\n"
                      "               devMenuConfiguration:(nullable RCTDevMenuConfiguration *)devMenuConfiguration;\n"
                      "#else\n"
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions;\n"
                      "#endif\n",
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions;\n",
                  ),
              ],
              "node_modules/expo/ios/AppDelegates/EXReactRootViewFactory.mm": [
                  ("#import <React/RCTDevMenu.h>\n", ""),
                  (
                      "#if TARGET_OS_IOS || TARGET_OS_TV\n"
                      "- (UIView *)viewWithModuleName:(NSString *)moduleName\n"
                      "             initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                 launchOptions:(nullable NSDictionary *)launchOptions\n"
                      "          devMenuConfiguration:(RCTDevMenuConfiguration *)devMenuConfiguration\n"
                      "{\n"
                      "  if (self.reactDelegate != nil) {\n"
                      "    return [((id<EXReactDelegateProtocol>)self.reactDelegate) createReactRootViewWithModuleName:moduleName initialProperties:initialProperties launchOptions:launchOptions];\n"
                      "  }\n"
                      "  return [super viewWithModuleName:moduleName initialProperties:initialProperties launchOptions:launchOptions devMenuConfiguration:devMenuConfiguration];\n"
                      "}\n\n"
                      "- (UIView *)superViewWithModuleName:(NSString *)moduleName\n"
                      "                  initialProperties:(nullable NSDictionary *)initialProperties\n"
                      "                      launchOptions:(nullable NSDictionary *)launchOptions\n"
                      "               devMenuConfiguration:(nullable RCTDevMenuConfiguration *)devMenuConfiguration\n"
                      "{\n"
                      "  if (devMenuConfiguration == nil) {\n"
                      "    devMenuConfiguration = [RCTDevMenuConfiguration defaultConfiguration];\n"
                      "  }\n\n"
                      "  return [super viewWithModuleName:moduleName initialProperties:initialProperties launchOptions:launchOptions devMenuConfiguration:devMenuConfiguration];\n"
                      "}\n"
                      "#else\n",
                      "",
                  ),
                  ("#endif\n\n- (NSURL *)bundleURL\n", "- (NSURL *)bundleURL\n"),
              ],
              "node_modules/expo/ios/AppDelegates/ExpoReactNativeFactory.swift": [
                  (
                      "      // RCTDevMenuConfiguration is only available in react-native 0.83+\n"
                      "#if os(iOS) || os(tvOS)\n"
                      "      // When calling `recreateRootViewWithBundleURL:` from `EXReactRootViewFactory`,\n"
                      "      // we don't want to loop the ReactDelegate again. Otherwise, it will be an infinite loop.\n"
                      "      rootView = factory.superView(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions ?? [:],\n"
                      "        devMenuConfiguration: self.devMenuConfiguration\n"
                      "      )\n"
                      "#else\n"
                      "      rootView = factory.superView(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions ?? [:]\n"
                      "      )\n"
                      "#endif\n",
                      "      // When calling `recreateRootViewWithBundleURL:` from `EXReactRootViewFactory`,\n"
                      "      // we don't want to loop the ReactDelegate again. Otherwise, it will be an infinite loop.\n"
                      "      rootView = factory.superView(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions ?? [:]\n"
                      "      )\n",
                  ),
                  (
                      "#if os(iOS) || os(tvOS)\n"
                      "      rootView = rootViewFactory.view(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions,\n"
                      "        devMenuConfiguration: self.devMenuConfiguration\n"
                      "      )\n"
                      "#else\n"
                      "      rootView = rootViewFactory.view(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions\n"
                      "      )\n"
                      "#endif\n",
                      "      rootView = rootViewFactory.view(\n"
                      "        withModuleName: moduleName ?? defaultModuleName,\n"
                      "        initialProperties: initialProps,\n"
                      "        launchOptions: launchOptions\n"
                      "      )\n",
                  ),
              ],
          }

          for file, edits in replacements.items():
              path = Path(file)
              text = path.read_text()
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f"Expected text not found in {file}")
                  text = text.replace(old, new, 1)
              path.write_text(text)
              print(f"Patched {file}")
          PY

      - name: Typecheck
        run: npm run typecheck

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Patch Podfile post_install for minimal strict-concurrency
        # See ios-unsigned-ipa.yml for rationale. CocoaPods rejects multiple
        # post_install hooks, so inject into the generated hook instead of
        # appending a second one.
        run: |
          python3 <<'PY'
          import re, sys
          p = "ios/Podfile"
          src = open(p).read()
          inject = (
              "\n"
              "    installer.pods_project.targets.each do |t|\n"
              "      t.build_configurations.each do |c|\n"
              "        c.build_settings['SWIFT_VERSION'] = '5.0'\n"
              "        c.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'\n"
              "      end\n"
              "    end\n"
          )
          marker = "    )\n  end\n"
          if marker not in src:
              sys.stderr.write("ERROR: react_native_post_install block terminator not found in Podfile\n")
              sys.exit(1)
          new = src.replace(marker, "    )" + inject + "\n  end\n", 1)
          open(p, "w").write(new)
          print(f"Patched ios/Podfile (injected {len(inject)} chars).")
          PY
          echo "--- Patched ios/Podfile ---"
          cat ios/Podfile

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build unsigned iPhoneOS app
        run: |
          set -uo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' -type d | head -n 1)
          if [ -z "$WORKSPACE" ]; then echo "No .xcworkspace found in ios/"; exit 1; fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"
          set +e
          xcodebuild \
            -quiet \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log | grep -E "error:|fatal error:|warning:.*error|\\*\\* BUILD FAILED|The following build commands failed|^(/.*):[0-9]+:[0-9]+:"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::group::xcodebuild error lines"
            grep -nE "error:|fatal error:|warning:.*error|\*\* BUILD FAILED" xcodebuild.log || true
            echo "::endgroup::"
            echo "::group::Swift diagnostic files"
            find build -name '*.dia' 2>/dev/null | while read d; do
              if strings "$d" 2>/dev/null | grep -qE "error:|warning:"; then
                echo "--- $d ---"
                strings "$d" 2>/dev/null | grep -E "error:|warning:|note:" | head -40
              fi
            done
            echo "::endgroup::"
            exit "$STATUS"
          fi

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name '*.app' -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 1; fi
          IPA="FamilyGuardian-${{ needs.version.outputs.version_name }}-unsigned.ipa"
          rm -rf Payload "$IPA"
          mkdir Payload
          cp -R "$APP_PATH" Payload/FamilyGuardian.app
          zip -qry "$IPA" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios-app/FamilyGuardian-${{ needs.version.outputs.version_name }}-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [version, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: dist

      - name: List release assets
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Family Guardian ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Automated build from commit ${{ github.sha }}.

            **Android** — install `family-guardian-${{ needs.version.outputs.version_name }}.apk`. Allow "Install from unknown sources" for your browser/file manager.

            **iOS native** — download `FamilyGuardian-${{ needs.version.outputs.version_name }}-unsigned.ipa`, then sign and install with Sideloadly or AltStore on Windows/macOS using a free Apple ID. Free-signed apps need to be re-signed every 7 days. See `docs/ios-native-sideloading.html`.

            **iOS PWA** — no download. From the iPhone, open Safari → `http://<your-server>:8080/app` → Share → Add to Home Screen.

            Version code: `${{ needs.version.outputs.version_code }}`.
          files: |
            dist/*.apk
            dist/*.ipa
          fail_on_unmatched_files: true
